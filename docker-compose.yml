services:
  backend:
    build: ./backend
    ports:
      - "5005:5000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-secret-key}
      - DATABASE_URL=sqlite:///docsly1.db
    volumes:
      - ./backend:/app
      - backend-data:/app/instance
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5005
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  mcp:
    build: ./backend
    command: python mcp_server.py
    ports:
      - "5001:5001"
    environment:
      - DATABASE_URL=sqlite:///docsly1.db
      - MCP_API_KEY=${MCP_API_KEY:-mcp-secret-key-change-in-production}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID:-docsly-openai-client}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET:-docsly-openai-secret}
      - OAUTH_REDIRECT_ALLOWLIST=https://chatgpt.com/connector_platform_oauth_redirect,https://chat.openai.com/aip/oauth/callback
      - OAUTH_ALLOW_ANY_REDIRECT=true
      - MCP_PORT=5001
    volumes:
      - ./backend:/app
      - backend-data:/app/instance
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  backend-data:
